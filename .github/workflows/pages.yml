name: Deploy Pages

# Deploys the catalog site to GitHub Pages after Site Build has succeeded on
# main. Rebuilds it here rather than downloading Site Build's artifacts, so
# this job's output is self-contained. `npm run build` in site/ regenerates
# the catalog index (via its `prebuild` hook) and produces site/dist/, the
# only thing actually deployed. See docs/SITE-SPEC.md.

on:
  workflow_run:
    workflows: ["Site Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci
        working-directory: site

      - name: Build (regenerates the catalog index, then the site)
        run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deployment
        uses: actions/deploy-pages@v4
