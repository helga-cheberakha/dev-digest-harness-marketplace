name: Site Build

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "scripts/build-index.mjs"
      - "site/**"
      - ".github/workflows/site-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "plugins/**"
      - "scripts/build-index.mjs"
      - "site/**"
      - ".github/workflows/site-build.yml"

jobs:
  build-index:
    name: Build catalog index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build catalog index
        run: node scripts/build-index.mjs

      - name: Upload catalog data
        uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: site/public

  build-site:
    name: Build catalog site (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site

      - name: Upload site build
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
